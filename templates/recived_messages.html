<!DOCTYPE html>
<html>
<head>
    <title>Send Message</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; }
        button { padding: 8px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <h2>Send Message to {{ receiver.username }}</h2>

    <form method="POST">
        {% csrf_token %}
        <textarea name="text" placeholder="Type your message here..."></textarea>
        <br>
        <button type="submit">Send</button>
    </form>

    <p><a href="{% url 'inbox' %}">Back to Inbox</a></p>
</div>

</body>
</html>
